<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }
  .post {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }
  .post img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.15) 100%);
  }
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 80px;
    z-index: 10;
  }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 24px;
  }
  .title {
    font-family: 'Instrument Serif', serif;
    font-size: 72px;
    color: white;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .subtitle {
    font-family: 'Geist', sans-serif;
    font-size: 24px;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
    max-width: 700px;
  }
  .logo-area {
    position: absolute;
    top: 60px;
    left: 80px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-area img {
    position: relative;
    width: 60px;
    height: auto;
    filter: invert(1) brightness(2);
  }
  .logo-text {
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: white;
    line-height: 1.4;
  }
  .logo-text span {
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="post">
  <img src="../public/images/mechazilla-catch.jpg" alt="">
  <div class="overlay"></div>
  <div class="logo-area">
    <img src="../public/logo.svg" alt="">
    <div class="logo-text">
      National Security Innovation Network<br>
      <span>at San Jos&eacute; State University</span>
    </div>
  </div>
  <div class="content">
    <div class="label">Introducing</div>
    <div class="title">National Security Innovation Network</div>
    <div class="subtitle">Bridging Silicon Valley technology with Washington's most pressing national security challenges.</div>
  </div>
</div>
</body>
</html>
