<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }
  .post {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #FFFFFF;
    padding: 80px;
    display: flex;
    flex-direction: column;
  }
  .header {
    margin-bottom: 60px;
  }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: #737373;
    margin-bottom: 16px;
  }
  .title {
    font-family: 'Instrument Serif', serif;
    font-size: 56px;
    color: #0A0A0A;
    line-height: 1.1;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
  }
  .card {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
  }
  .card img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
  }
  .card-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px;
    z-index: 10;
  }
  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    color: white;
    line-height: 1.15;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 40px;
  }
  .logo-area img {
    width: 32px;
    height: auto;
  }
  .logo-text {
    font-family: 'Geist', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #737373;
  }
</style>
</head>
<body>
<div class="post">
  <div class="header">
    <div class="label">What We Do</div>
    <div class="title">Four focus areas</div>
  </div>
  <div class="grid">
    <div class="card">
      <img src="../public/images/speaker-podium.jpg" alt="">
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-num">01</div>
        <div class="card-title">Speaker Series</div>
      </div>
    </div>
    <div class="card">
      <img src="../public/images/mission-control.jpg" alt="">
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-num">02</div>
        <div class="card-title">Build & Compete</div>
      </div>
    </div>
    <div class="card">
      <img src="../public/images/satellite.jpg" alt="">
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-num">03</div>
        <div class="card-title">Government & Industry Projects</div>
      </div>
    </div>
    <div class="card">
      <img src="../public/images/capitol.jpg" alt="">
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-num">04</div>
        <div class="card-title">Policy & Strategy</div>
      </div>
    </div>
  </div>
  <div class="logo-area">
    <img src="../public/logo.svg" alt="">
    <div class="logo-text">NSIN at SJSU</div>
  </div>
</div>
</body>
</html>
