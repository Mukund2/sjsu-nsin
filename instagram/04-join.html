<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
  }
  .post > img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.15) 100%);
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px;
    z-index: 10;
    text-align: center;
  }
  .title {
    font-family: 'Instrument Serif', serif;
    font-size: 72px;
    color: white;
    line-height: 1.1;
    margin-bottom: 32px;
  }
  .subtitle {
    font-family: 'Geist', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
    max-width: 600px;
    margin-bottom: 48px;
  }
  .button {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #0A0A0A;
    background: white;
    padding: 18px 48px;
    display: inline-block;
  }
  .logo-area {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }
  .logo-area img {
    width: 40px;
    height: auto;
    filter: invert(1) brightness(2);
  }
  .logo-text {
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="post">
  <img src="../public/images/falcon9.jpg" alt="">
  <div class="overlay"></div>
  <div class="logo-area">
    <img src="../public/logo.svg" alt="">
    <div class="logo-text">NSIN at SJSU</div>
  </div>
  <div class="content">
    <div class="title">Build things that matter</div>
    <div class="subtitle">Engineers, designers, and policy thinkers working on real problems for real stakeholders.</div>
    <div class="button">Link in bio</div>
  </div>
</div>
</body>
</html>
